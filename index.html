<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>To-Do List</title>
</head>

<body>
    <div id="app">
        <h1>To-Do List</h1>
        <div class="container">
            <div class="task-input-row">
                <input type="text" id="task" placeholder="Enter a new task">
                <input type="datetime-local" id="dueDate">
                <button type="button" id="addTask" class="addTaskBtn">Add Task</button>
            </div>
            <div class="filterBtn">
                <button type="button" id="all">All</button>
                <button type="button" id="pending">Pending</button>
                <button type="button" id="completed">Completed</button>
            </div>
            <div class="clearCompleted">
                <button type="button" id="clearCompleted" class="clear">Clear Completed</button>
            </div>
            
            <ul id="taskList">

            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
